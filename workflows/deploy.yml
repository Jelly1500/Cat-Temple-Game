name: Deploy WebGL to Pages

on:
  push:
    branches: [ main ] # push를 감지할 브랜치 명 확인

permissions:
  contents: read
  pages: write
  id-token: write

# 이전 배포 작업이 진행 중이면 취소하고 최신 것만 실행
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Pages
        uses: actions/configure-pages@v5 # 최신 버전 사용
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # 유니티 빌드 파일이 들어있는 폴더 경로 (반드시 확인!)
          path: './docs'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        env:
          # Node.js 24 강제 사용 설정 (환경 변수 적용)
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
